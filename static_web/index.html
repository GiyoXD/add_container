<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logistics Data Entry - Static Web</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://kjur.github.io/jsrsasign/jsrsasign-all-min.js"></script>
    <style>
        body { background-color: #f8f9fa; padding: 20px; }
        .log-container { height: 200px; overflow-y: scroll; background: #000; color: #0f0; font-family: monospace; padding: 10px; border-radius: 5px; }
        .settings-section { background: #fff; padding: 15px; border-radius: 5px; margin-bottom: 20px; border: 1px solid #dee2e6; }
        .table-container { background: #fff; padding: 15px; border-radius: 5px; border: 1px solid #dee2e6; margin-top: 20px; }
        .hidden { display: none; }
        
        /* Improved Table Styling */
        #resultsTable th {
            white-space: nowrap;
            background-color: #6c757d !important;
            color: white !important;
            vertical-align: middle;
            text-align: center;
            padding: 12px 8px;
        }
        #resultsTable td {
            vertical-align: middle;
            padding: 8px;
        }
        .table-responsive {
            border-radius: 5px;
            overflow: hidden;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="text-center mb-4">Vision Logistics Data Entry</h1>

        <!-- Settings Toggle -->
        <div class="mb-3 text-end">
            <button id="toggleSettings" class="btn btn-sm btn-outline-secondary">Show/Hide Settings</button>
        </div>

        <!-- Settings Section -->
        <div id="settingsContainer" class="settings-section hidden">
            <h4>Settings (Cached in Browser)</h4>
            <div class="mb-3">
                <label class="form-label">Gemini API Key</label>
                <input type="password" id="geminiKey" class="form-control" placeholder="Enter Gemini API Key">
            </div>
            <div class="mb-3">
                <label class="form-label">Google Spreadsheet ID</label>
                <input type="text" id="spreadsheetId" class="form-control" placeholder="Enter Spreadsheet ID">
            </div>
            <div class="mb-3">
                <label class="form-label">Google Service Account JSON</label>
                <textarea id="serviceAccountJson" class="form-control" rows="3" placeholder='{"type": "service_account", ...}'></textarea>
            </div>
            <button id="saveSettings" class="btn btn-primary">Save Settings</button>
            <button id="clearSettings" class="btn btn-danger">Clear Cache</button>
        </div>

        <div class="row">
            <div class="col-md-6">
                <!-- Step 1: Image Selection -->
                <div class="card mb-3">
                    <div class="card-header bg-primary text-white">Step 1: Image Selection</div>
                    <div class="card-body">
                        <input type="file" id="imageInput" class="form-control" accept="image/*">
                    </div>
                </div>
            </div>
            <div class="col-md-6">
                <!-- Step 2: Invoice IDs -->
                <div class="card mb-3">
                    <div class="card-header bg-primary text-white">Step 2: Enter Invoice IDs</div>
                    <div class="card-body">
                        <textarea id="invoiceIds" class="form-control" rows="3" placeholder="One ID per line, in order"></textarea>
                    </div>
                </div>
            </div>
        </div>

        <!-- Step 3: Action -->
        <div class="row mb-4">
            <div class="col-md-12 d-grid gap-2 mb-2">
                <button id="processBtn" class="btn btn-success btn-lg">Step 3: Process & Sync to Google Sheets</button>
            </div>
            <div class="col-md-4 d-grid">
                <button id="fetchBtn" class="btn btn-outline-info">Fetch Data from Google Sheets</button>
            </div>
            <div class="col-md-8">
                <input type="text" id="searchInput" class="form-control" placeholder="Search/Filter 2026 data...">
            </div>
        </div>

        <!-- Results Table -->
        <div class="table-container">
            <h4>Sheet Data Preview</h4>
            <div class="table-responsive">
                <table id="resultsTable" class="table table-bordered table-striped">
                    <thead>
                        <tr id="tableHeader"></tr>
                    </thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
        </div>

        <!-- Logs -->
        <div class="card mb-3 mt-4">
            <div class="card-header">Status/Log</div>
            <div class="card-body">
                <div id="log" class="log-container"></div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
